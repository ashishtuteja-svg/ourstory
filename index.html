const PALETTE = ["#b07a36","#a06030","#7a5a34","#906845","#c07858","#5a8060","#4a6fa5","#8a5090","#c06858","#5a7a90"];
const CIRCLE_COLORS = ["#c8943a","#3a8fa4","#7a5a90","#5a8060","#c06858","#4a6fa5"];

function fmtDur(s) { return Math.floor(s / 60) + ":" + (String(Math.floor(s % 60)).padStart(2, "0")); }

// Extract place / date / people from a voice transcript (no API needed)
function extractFromText(text, circleMembers) {
  if (!text || text.length < 3) return {};
  const result = {};
  const lower = text.toLowerCase();
  const monthNames = ["january","february","march","april","may","june","july","august","september","october","november","december"];
  const monthShort = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];

  // Year: grab any 4-digit number 1950-2030 from transcript (most reliable)
  const yr4digit = (text.match(/\d{4}/g) || []).map(Number).find(n => n >= 1950 && n <= 2030);
  if (yr4digit) {
    result.year = yr4digit;
  } else {
    // Spoken year forms
    const n = lower.replace(/-/g, " ");
    const spoken = [
      ["twenty twenty six",2026],["twenty twenty five",2025],["twenty twenty four",2024],
      ["twenty twenty three",2023],["twenty twenty two",2022],["twenty twenty one",2021],
      ["twenty twenty",2020],["twenty nineteen",2019],["twenty eighteen",2018],
      ["twenty seventeen",2017],["twenty sixteen",2016],["twenty fifteen",2015],
      ["twenty fourteen",2014],["twenty thirteen",2013],["twenty twelve",2012],
      ["twenty eleven",2011],["twenty ten",2010],
      ["two thousand and twenty five",2025],["two thousand and twenty four",2024],
      ["two thousand and twenty two",2022],["two thousand and twenty",2020],
      ["two thousand and nineteen",2019],["two thousand and fifteen",2015],
      ["two thousand and ten",2010],["two thousand and five",2005],["two thousand",2000],
    ];
    for (const [p, y] of spoken) { if (n.includes(p)) { result.year = y; break; } }
  }

  // Month — skip "may" if it appears as a verb (short word heuristic)
  for (let i = 0; i < monthNames.length; i++) {
    const full = monthNames[i], short = monthShort[i];
    if (i === 4) {
      // "May" — only count if followed by a year or preceded by "in" / "last" / "this"
      if (lower.match(/\b(?:in|last|this)\s+may\b/) || lower.match(/\bmay\s+20[0-9]{2}\b/)) {
        result.month = "May"; break;
      }
    } else if (lower.includes(full) || lower.includes(short + " ") || lower.endsWith(short)) {
      result.month = full.charAt(0).toUpperCase() + full.slice(1);
      break;
    }
  }

  // Place: case-insensitive — after "in", "at", "to", or before "mein"/"main"
  const skipWords = new Set([...monthNames, ...monthShort,
    "the","and","was","were","had","with","this","that","when","went","been","have",
    "from","back","just","very","really","there","here","some","also","into","onto",
    "twenty","nineteen","eighteen","seventeen","sixteen","fifteen","fourteen","thirteen",
    "twelve","eleven","ten","two","thousand","hundred","zero","one","two","three"]);
  const placeRe = [
    /\b(?:in|at|to|from|visited|went to|trip to|we were in)\s+([a-zA-Z]+)/i,
    /([a-zA-Z]+)\s+(?:mein|main|me\b)/i
  ];
  for (const re of placeRe) {
    const m = lower.match(re);
    if (m && m[1]) {
      const candidate = m[1].trim();
      const words = candidate.split(" ");
      const firstWord = words[0];
      if (firstWord.length > 2 && !skipWords.has(firstWord)) {
        // Capitalise each word
        result.place = words.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
        break;
      }
    }
  }

  // People: match circle member first names
  const mentioned = (circleMembers || []).filter(mem => {
    const first = mem.name.split(" ")[0].toLowerCase();
    return lower.includes(first) && first.length > 2;
  }).map(m => m.name);
  if (mentioned.length > 0) result.people = mentioned;

  return result;
}

// ── SPEECH HOOK ───────────────────────────────────────────────────────────────
function useSpeech() {
  const [transcript, setTranscript] = useState("");
  const [active, setActive] = useState(false);
  const recRef = useRef(null);

  const start = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return; // gracefully skip if not supported
    try {
      const r = new SR();
      r.continuous = true;
      r.interimResults = true;
      r.onresult = e => {
        let t = "";
        for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript + " ";
        setTranscript(t.trim());
      };
      r.onerror = () => {};
      r.onend = () => setActive(false);
      r.start();
      recRef.current = r;
      setActive(true);
    } catch(e) {}
  }, []);

  const stop = useCallback(() => {
    if (recRef.current) { try { recRef.current.stop(); } catch(e) {} recRef.current = null; }
    setActive(false);
  }, []);

  const reset = useCallback(() => setTranscript(""), []);
  return { transcript, active, start, stop, reset };
}

// ── RECORDER HOOK ─────────────────────────────────────────────────────────────
function useRecorder() {
  const [state, setState] = useState("idle");
  const [duration, setDuration] = useState(0);
  const [audioUrl, setAudioUrl] = useState(null);
  const [audioBlob, setAudioBlob] = useState(null);
  const mediaRef = useRef(null);
  const chunksRef = useRef([]);
  const timerRef = useRef(null);

  // Detect best supported audio format for this browser/OS
  function getMimeType() {
    const types = ["audio/mp4", "audio/webm;codecs=opus", "audio/webm", "audio/ogg"];
    for (const t of types) {
      if (typeof MediaRecorder !== "undefined" && MediaRecorder.isTypeSupported(t)) return t;
    }
    return ""; // let browser decide
  }

  const start = useCallback(async () => {
    try {
      setState("requesting");
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      // Do NOT create AudioContext on iOS — it conflicts with MediaRecorder
      const mimeType = getMimeType();
      const recOpts = mimeType ? { mimeType } : {};
      const rec = new MediaRecorder(stream, recOpts);
      chunksRef.current = [];
      rec.ondataavailable = e => { if (e.data && e.data.size > 0) chunksRef.current.push(e.data); };
      rec.onstop = () => {
        const mime = rec.mimeType || mimeType || "audio/mp4";
        const blob = new Blob(chunksRef.current, { type: mime });
        setAudioBlob(blob);
        setAudioUrl(URL.createObjectURL(blob));
        setState("done");
        stream.getTracks().forEach(t => t.stop());
      };
      rec.start(250); // collect data every 250ms — ensures chunks arrive on iOS
      mediaRef.current = rec;
      setState("recording");
      setDuration(0);
      timerRef.current = setInterval(() => setDuration(d => d + 1), 1000);
    } catch(e) {
      setState("error");
    }
  }, []);

  const stop = useCallback(() => {
    clearInterval(timerRef.current);
    if (mediaRef.current && mediaRef.current.state === "recording") {
      mediaRef.current.stop();
    }
  }, []);

  const reset = useCallback(() => {
    if (audioUrl) URL.revokeObjectURL(audioUrl);
    setAudioUrl(null);
    setAudioBlob(null);
    setState("idle");
    setDuration(0);
  }, [audioUrl]);

  return { state, duration, audioUrl, audioBlob, analyser: null, start, stop, reset };
}

function LiveWave({ analyser, color }) {
  const [heights, setHeights] = useState(Array(18).fill(3));
  useEffect(() => {
    if (!analyser) return;
    let raf;
    const buf = new Uint8Array(analyser.frequencyBinCount);
    const tick = () => {
      analyser.getByteFrequencyData(buf);
      const step = Math.floor(buf.length / 18);
      setHeights(Array.from({ length: 18 }, (_, i) => Math.max(3, Math.min(26, (buf[i * step] || 0) / 255 * 26))));
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [analyser]);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 2.5, height: 30 }}>
      {heights.map((h, i) => <div key={i} style={{ width: 3, borderRadius: 2, height: h, background: color, transition: "height 0.05s" }} />)}
    </div>
  );
}

// ── EXIF READER — uses exifr library ─────────────────────────────────────────
async function readExif(file) {
  try {
    if (typeof exifr === "undefined") return {};
    const data = await exifr.parse(file, { gps: true, pick: ["DateTimeOriginal", "latitude", "longitude"] });
    if (!data) return {};
    const result = {};
    if (data.DateTimeOriginal) {
      const d = new Date(data.DateTimeOriginal);
      if (!isNaN(d)) {
        result.year = d.getFullYear();
        const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        result.month = monthNames[d.getMonth()];
      }
    }
    if (data.latitude && data.longitude) {
      result.gps = { lat: data.latitude, lon: data.longitude };
    }
    return result;
  } catch(e) { return {}; }
}

async function reverseGeocode(lat, lon) {
  try {
    const r = await fetch(
      "https://nominatim.openstreetmap.org/reverse?lat=" + lat + "&lon=" + lon + "&format=json&zoom=10",
      { headers: { "Accept-Language": "en" } }
    );
    const d = await r.json();
    const addr = d.address || {};
    return addr.city || addr.town || addr.village || addr.county || addr.state || "";
  } catch(e) { return ""; }
}

  const [year, setYear] = useState("");
  const [tagged, setTagged] = useState([]);
  const [transcript, setTranscript] = useState("");

  const fileRef = useRef(null);
  const audioRef = useRef(null);
  const rec = useRecorder();

  const handlePhoto = async e => {

    setPhotoPreview(URL.createObjectURL(file));
    // Read EXIF silently — pre-fill date and location if found
    try {
      const exif = await readExif(file);
      if (exif.year) setYear(String(exif.year));
      if (exif.month) setMonth(exif.month);
      if (exif.gps) {
        const city = await reverseGeocode(exif.gps.lat, exif.gps.lon);
        if (city) setPlace(city);
      }
    } catch(e) {}
  };

  // Capture transcript at stop time via ref — most reliable on iOS
  const liveTranscriptRef = useRef("");
  useEffect(() => { liveTranscriptRef.current = speech.transcript; }, [speech.transcript]);

  const handleStartRec = () => {
    speech.reset();
    liveTranscriptRef.current = "";
    speech.start();
    setTimeout(() => rec.start(), 200);
  };

  const handleStopRec = () => {
    // Snapshot transcript NOW before speech recognition clears it
    const snapTx = liveTranscriptRef.current || speech.transcript || "";
    rec.stop();
    speech.stop();
    // Extract after a delay to let rec.state update
    // Voice only fills EMPTY fields — never overwrites what EXIF already found
    setTimeout(() => {
      const tx = snapTx || liveTranscriptRef.current || "";
      const data = extractFromText(tx, circle.members || []);
      if (data.place) setPlace(prev => prev || data.place);
      if (data.month) setMonth(prev => prev || data.month);
      if (data.year)  setYear(prev => prev || String(data.year));
      if (data.people && data.people.length > 0) setTagged(data.people);
      setTranscript(tx);
    }, 300);
  };

  // Auto-advance to review when recording is done
  useEffect(() => {
    if (rec.state === "done") {
      setTimeout(() => setStep(3), 600);
    }
  }, [rec.state]);

  const toggleTag = name => setTagged(ts => ts.includes(name) ? ts.filter(n => n !== name) : [...ts, name]);

  const togglePlay = () => {
    if (!audioRef.current) return;
    if (playing) { audioRef.current.pause(); setPlaying(false); }
    else {
      if (rec.audioUrl) audioRef.current.src = rec.audioUrl;
      playAudio(audioRef.current);
      setPlaying(true);
    }
  };

  const finish = async () => {
    setSaving(true);
    try {
      const people = [userName, ...tagged.filter(t => t !== userName)];
      const meta = {
        place: place || null,
        year: year ? parseInt(year) : null,
        month: month || null,
        caption: null,
      };
      await dbSaveMemory(circle.id, people, meta, photoFile, rec.audioBlob, rec.duration, userName);
      // Don't reload entire circle — just signal success and let parent refresh lazily
      onSaved(null);
      setStep(4);
      setTimeout(onClose, 1800);
    } catch(e) {
      alert("Could not save. Please check your connection.");
      setSaving(false);
    }
  };

  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  return (
    <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(18,8,2,0.9)", zIndex: 200, display: "flex", flexDirection: "column", justifyContent: "flex-end", borderRadius: 42 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#fdf6ec", borderRadius: "28px 28px 0 0", maxHeight: "94%", display: "flex", flexDirection: "column", animation: "slideUp 0.3s ease", paddingBottom: "env(safe-area-inset-bottom,0px)" }}>

        {/* Header */}
        <div style={{ padding: "14px 18px 0", flexShrink: 0 }}>
          <div style={{ width: 32, height: 3, borderRadius: 2, background: "#d4b896", margin: "0 auto 14px" }} />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 16, fontWeight: 800, color: "#3d2410" }}>
              {step === 1 && "📸 Add a photo"}
              {step === 2 && "🎙 Tell the story"}
              {step === 3 && "✏️ Looks right?"}
              {step === 4 && "🎉 Saved!"}
            </div>
            <button onClick={onClose} style={{ background: "rgba(196,154,60,0.12)", border: "none", borderRadius: "50%", width: 28, height: 28, fontSize: 14, cursor: "pointer", color: "#9c7a52" }}>✕</button>
          </div>
          {step < 4 && (
            <div style={{ display: "flex", gap: 4, marginBottom: 14 }}>
              {[1, 2, 3].map(s => <div key={s} style={{ height: 3, flex: 1, borderRadius: 2, transition: "background 0.3s", background: step >= s ? color : "rgba(196,154,60,0.2)" }} />)}
            </div>
          )}
        </div>

        <div style={{ flex: 1, overflowY: "auto", padding: "0 18px 24px" }}>

          {/* ── STEP 1: Photo ─────────────────────────────────────────── */}
          {step === 1 && (
            <div style={{ animation: "fadeIn 0.2s ease" }}>
              <div style={{ fontSize: 13, color: "#7a5c38", fontStyle: "italic", marginBottom: 16, lineHeight: 1.6 }}>Start with a photo, or skip straight to the voice.</div>
              <div
                onClick={() => fileRef.current && fileRef.current.click()}
                style={{ height: 190, borderRadius: 20, marginBottom: 20, overflow: "hidden", position: "relative", cursor: "pointer", background: photoPreview ? "url(" + photoPreview + ") center/cover" : "rgba(196,148,58,0.07)", border: "2px dashed " + (photoPreview ? "transparent" : color + "55"), display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}
              >
                {photoPreview
                  ? <div style={{ position: "absolute", bottom: 10, right: 10, background: "rgba(0,0,0,0.5)", borderRadius: 20, padding: "4px 10px", fontSize: 11, color: "#fff" }}>Tap to change</div>
                  : (
                    <React.Fragment>
                      <div style={{ fontSize: 44, marginBottom: 8, opacity: 0.4 }}>📷</div>
                      <div style={{ fontSize: 13, color: color, fontWeight: 600 }}>Tap to add photo</div>
                      <div style={{ fontSize: 11, color: "#b09070", marginTop: 4 }}>Optional</div>
                    </React.Fragment>
                  )
                }
              </div>
              <input ref={fileRef} type="file" accept="image/*,video/*" onChange={handlePhoto} style={{ display: "none" }} />
              <div style={{ display: "flex", gap: 10 }}>
                {photoPreview && (
                  <button onClick={() => { setPhotoFile(null); setPhotoPreview(null); }} style={{ padding: "12px 16px", borderRadius: 16, background: "transparent", border: "1.5px solid " + color, color: color, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>✕</button>
                )}
                <button onClick={() => setStep(2)} style={{ flex: 1, padding: "14px", borderRadius: 17, background: "linear-gradient(135deg," + color + "," + color + "cc)", border: "none", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                  {photoPreview ? "Next: Add voice →" : "Skip → Add voice"}
                </button>
              </div>
            </div>
          )}

          {/* ── STEP 2: Voice ─────────────────────────────────────────── */}
          {step === 2 && (
            <div style={{ animation: "fadeIn 0.2s ease" }}>
              {photoPreview && <div style={{ height: 90, borderRadius: 16, marginBottom: 16, background: "url(" + photoPreview + ") center/cover", overflow: "hidden" }} />}

              <div style={{ background: "rgba(196,148,58,0.06)", borderRadius: 22, padding: "20px", marginBottom: 16, border: "1px solid " + color + "22" }}>

                {/* Hint text — only when idle */}
                {(rec.state === "idle" || rec.state === "error") && (
                  <div style={{ fontSize: 12, color: "#b09070", fontStyle: "italic", textAlign: "center", lineHeight: 1.8, marginBottom: 18 }}>
                    Speak naturally — just describe the moment.<br />
                    <span style={{ color: color, fontStyle: "normal", fontWeight: 600 }}>"This was Shimla, March 2022.<br />Papa and Dadi were there — we were all laughing..."</span>
                  </div>
                )}

                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 14 }}>
                  {rec.state === "requesting" && <div style={{ fontSize: 13, color: "#b09070" }}>Allow microphone access...</div>}

                  {rec.state === "recording" && (
                    <React.Fragment>
                      <LiveWave analyser={rec.analyser} color={color} />
                      <div style={{ fontSize: 13, color: color, fontWeight: 700 }}>Recording — {fmtDur(rec.duration)}</div>
                      {speech.transcript && speech.transcript.length > 0 && (
                        <div style={{ fontSize: 11, color: "#7a5c38", fontStyle: "italic", textAlign: "center", lineHeight: 1.6, padding: "0 4px", wordBreak: "break-word" }}>
                          "{speech.transcript.length > 120 ? speech.transcript.slice(0, 120) + "..." : speech.transcript}"
                        </div>
                      )}
                    </React.Fragment>
                  )}

                  {rec.state === "done" && (
                    <React.Fragment>
                      <Spin color={color} size={20} />
                      <div style={{ fontSize: 12, color: color }}>Reading your voice...</div>
                    </React.Fragment>
                  )}

                  {(rec.state === "idle" || rec.state === "error" || rec.state === "recording") && (
                    <MicBtn
                      on={rec.state === "recording"}
                      color={color}
                      size={84}
                      onClick={rec.state === "recording" ? handleStopRec : handleStartRec}
                    />
                  )}

                  <div style={{ fontSize: 11, color: rec.state === "recording" ? "#c06858" : color, fontWeight: 600, letterSpacing: "0.07em", textTransform: "uppercase" }}>
                    {rec.state === "idle" && "Tap to record"}
                    {rec.state === "recording" && "Tap to stop"}
                    {rec.state === "error" && "Mic blocked — needs https://"}
                    {rec.state === "done" && ""}
                  </div>
                </div>
              </div>

              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => setStep(1)} style={{ padding: "12px 16px", borderRadius: 16, background: "transparent", border: "1.5px solid " + color, color: color, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>← Back</button>
                <button onClick={() => setStep(3)} style={{ flex: 1, padding: "12px", borderRadius: 16, background: "rgba(196,154,60,0.15)", border: "none", color: "#9c7a52", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                  Skip → Review
                </button>
              </div>
            </div>
          )}

          {/* ── STEP 3: Review & Edit ──────────────────────────────────── */}
          {step === 3 && (
            <div style={{ animation: "fadeIn 0.25s ease" }}>

              {/* Photo thumbnail */}
              {photoPreview && <div style={{ height: 90, borderRadius: 16, marginBottom: 16, background: "url(" + photoPreview + ") center/cover", overflow: "hidden" }} />}

              {/* Voice playback */}
              {rec.audioUrl && (
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#b09070", marginBottom: 6 }}>🎙 Your recording</div>
                  <audio controls src={rec.audioUrl} preload="auto"
                    style={{ width: "100%", accentColor: color }} />
                </div>
              )}

              {transcript.length > 0 && (
                <div style={{ background: "rgba(196,148,58,0.07)", borderRadius: 12, padding: "9px 14px", marginBottom: 12, border: "1px solid rgba(196,154,60,0.15)" }}>
                  <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#b09070", marginBottom: 4 }}>🎙 We heard</div>
                  <div style={{ fontSize: 12, color: "#7a5c38", fontStyle: "italic", lineHeight: 1.6 }}>"{transcript.length > 160 ? transcript.slice(0, 160) + "..." : transcript}"</div>
                </div>
              )}
              {transcript.length === 0 && rec.audioUrl && (
                <div style={{ background: "rgba(196,148,58,0.05)", borderRadius: 12, padding: "9px 14px", marginBottom: 12, border: "1px dashed rgba(196,154,60,0.2)", textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: "#b09070", fontStyle: "italic" }}>Couldn't catch the words — fill in the fields below</div>
                </div>
              )}
              <div style={{ fontSize: 11, color: "#b09070", fontStyle: "italic", marginBottom: 12, textAlign: "center" }}>
                {!rec.audioUrl && "Fill in the details below"}
              </div>

              {/* Editable fields */}
              <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 18 }}>

                {/* Place + Year in one row */}
                <div style={{ display: "flex", gap: 10 }}>
                  <div style={{ flex: 1.4, background: "#fff", borderRadius: 14, padding: "12px 14px", border: "1.5px solid rgba(196,154,60,0.18)" }}>
                    <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#b09070", marginBottom: 6 }}>📍 Place</div>
                    <input value={place} onChange={e => setPlace(e.target.value)} placeholder="London, Shimla..." style={{ width: "100%", border: "none", background: "transparent", fontSize: 13, color: "#3d2410", outline: "none", fontFamily: "Georgia,serif" }} />
                  </div>
                  <div style={{ flex: 1, background: "#fff", borderRadius: 14, padding: "12px 14px", border: "1.5px solid rgba(196,154,60,0.18)" }}>
                    <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#b09070", marginBottom: 6 }}>📅 Year</div>
                    <input value={year} onChange={e => setYear(e.target.value)} placeholder="2025" type="number" style={{ width: "100%", border: "none", background: "transparent", fontSize: 13, color: "#3d2410", outline: "none", fontFamily: "Georgia,serif" }} />
                  </div>
                </div>

                {/* Month picker */}
                <div style={{ background: "#fff", borderRadius: 14, padding: "12px 14px", border: "1.5px solid rgba(196,154,60,0.18)" }}>
                  <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#b09070", marginBottom: 8 }}>🗓 Month</div>
                  <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                    {MONTHS.map(m => (
                      <button key={m} onClick={() => setMonth(month === m ? "" : m)} style={{ padding: "4px 10px", borderRadius: 20, fontSize: 10, cursor: "pointer", border: "1px solid " + (month === m ? color : "rgba(196,154,60,0.22)"), background: month === m ? color + "18" : "transparent", color: month === m ? color : "#7a5c38", fontWeight: month === m ? 700 : 400 }}>
                        {m.slice(0, 3)}
                      </button>
                    ))}
                  </div>
                </div>

                {/* People */}
                <div style={{ background: "#fff", borderRadius: 14, padding: "12px 14px", border: "1.5px solid rgba(196,154,60,0.18)" }}>
                  <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#b09070", marginBottom: 8 }}>👥 People</div>
                  {/* Always-on: current user */}
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <Av name={userName} size={28} col={color} />
                    <span style={{ fontSize: 12, color: "#3d2410", flex: 1 }}>{userName}</span>
                    <span style={{ fontSize: 11, color: color }}>✅</span>
                  </div>
                  {(circle.members || []).map(mem => (
                    <div key={mem.id} onClick={() => toggleTag(mem.name)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", cursor: "pointer", borderTop: "1px solid rgba(196,154,60,0.08)" }}>
                      <Av name={mem.name} size={28} />
                      <span style={{ fontSize: 12, color: "#3d2410", flex: 1 }}>{mem.name}</span>
                      <div style={{ width: 20, height: 20, borderRadius: "50%", background: tagged.includes(mem.name) ? color : "rgba(196,154,60,0.12)", border: "1.5px solid " + (tagged.includes(mem.name) ? color : "rgba(196,154,60,0.3)"), display: "flex", alignItems: "center", justifyContent: "center" }}>
                        {tagged.includes(mem.name) && <span style={{ fontSize: 10, color: "#fff" }}>✓</span>}
                      </div>
                    </div>
                  ))}
                  {(circle.members || []).length === 0 && <div style={{ fontSize: 11, color: "#c0a080", fontStyle: "italic" }}>No circle members yet</div>}
                </div>

              </div>

              {/* Save button */}
              <button onClick={finish} disabled={saving} style={{ width: "100%", padding: "14px", borderRadius: 17, background: "linear-gradient(135deg," + color + "," + color + "cc)", border: "none", color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
                {saving ? <Spin color="#fff" size={18} /> : "✅ Save Memory"}
              </button>

              {/* Re-record option */}
              {rec.audioUrl && (
                <button onClick={() => { rec.reset(); speech.reset(); setStep(2); setPlace(""); setMonth(""); setYear(""); setTagged([]); setTranscript(""); }} style={{ width: "100%", marginTop: 8, padding: "8px", background: "none", border: "none", color: "#b09070", fontSize: 11, cursor: "pointer", textDecoration: "underline" }}>
                  🎙 Re-record voice
                </button>
              )}
            </div>
          )}

          {/* ── STEP 4: Done ──────────────────────────────────────────── */}
          {step === 4 && (
            <div style={{ textAlign: "center", padding: "28px 10px", animation: "pop 0.4s ease" }}>
              <div style={{ fontSize: 60, marginBottom: 14 }}>🎉</div>
              <div style={{ fontSize: 19, fontWeight: 800, color: "#3d2410", marginBottom: 8 }}>Memory saved!</div>
              <div style={{ fontSize: 13, color: "#b09070", fontStyle: "italic", lineHeight: 1.8 }}>
                {place && <span>📍 {place}<br /></span>}
                {month && year && <span>📅 {month} {year}<br /></span>}
                Stored safely in the cloud.
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

// ── ADD MEMBER FORM ───────────────────────────────────────────────────────────

  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [showPhone, setShowPhone] = useState(false);
  const doAdd = () => {
    if (!name.trim()) return;
    onAdd({ id: Date.now(), name: name.trim(), phone: phone.trim(), joined: false, code: mkCode() });
    setName(""); setPhone(""); setShowPhone(false);
  };
  return (
    <div style={{ background: "#fff", borderRadius: 15, padding: "13px", marginBottom: 14, border: "1px solid rgba(196,154,60,0.14)" }}>
      <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#b09070", marginBottom: 9 }}>Add a Member</div>
      <div style={{ display: "flex", gap: 7, marginBottom: showPhone ? 8 : 0 }}>
        <input value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && doAdd()} placeholder="Their name..." style={{ flex: 1, padding: "9px 12px", borderRadius: 11, border: "1.5px solid rgba(196,154,60,0.25)", background: "#fdf6ec", fontSize: 13, color: "#3d2410", outline: "none" }} />
        {!showPhone && <button onClick={() => name.trim() && setShowPhone(true)} style={{ padding: "9px 12px", borderRadius: 11, background: "rgba(196,154,60,0.08)", border: "1px solid rgba(196,154,60,0.2)", color: "#9c7a52", fontSize: 18, cursor: "pointer", opacity: name.trim() ? 1 : 0.4 }}>📱</button>}
        {!showPhone && <button onClick={doAdd} style={{ padding: "9px 15px", borderRadius: 11, background: name.trim() ? "linear-gradient(135deg," + color + "," + color + "cc)" : "rgba(196,154,60,0.15)", border: "none", color: name.trim() ? "#fff" : "#c0a080", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Add</button>}
      </div>
      {showPhone && (
        <div style={{ animation: "fadeIn 0.2s ease" }}>
          <div style={{ fontSize: 10, color: "#b09070", marginBottom: 5, fontStyle: "italic" }}>📱 Phone for WhatsApp invite</div>
          <div style={{ display: "flex", gap: 7 }}>
            <input value={phone} onChange={e => setPhone(e.target.value)} onKeyDown={e => e.key === "Enter" && doAdd()} placeholder="+91 98765 43210" type="tel" style={{ flex: 1, padding: "9px 12px", borderRadius: 11, border: "1.5px solid rgba(196,154,60,0.25)", background: "#fdf6ec", fontSize: 13, color: "#3d2410", outline: "none", fontFamily: "monospace" }} />
            <button onClick={doAdd} style={{ padding: "9px 15px", borderRadius: 11, background: name.trim() ? "linear-gradient(135deg," + color + "," + color + "cc)" : "rgba(196,154,60,0.15)", border: "none", color: name.trim() ? "#fff" : "#c0a080", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Add</button>
          </div>
          <button onClick={() => setShowPhone(false)} style={{ background: "none", border: "none", color: "#b09070", fontSize: 10, cursor: "pointer", marginTop: 4 }}>Skip phone</button>
        </div>
      )}
    </div>
  );
}

function InviteActions({ mem, circle, copied, onCopied }) {
  const link = "ourstory.app/join/" + circle.code + "/" + mem.code;
  const msg = "Hi " + mem.name + "! I've added you to *" + circle.label + "* on Our Story 🏡\n\nTap to join: https://" + link + "\n\nJust type your name — no password needed!";
  const hasPhone = mem.phone && cleanPhone(mem.phone).length >= 8;
  const waUrl = hasPhone ? "https://wa.me/" + cleanPhone(mem.phone).replace("+", "") + "?text=" + encodeURIComponent(msg) : "https://wa.me/?text=" + encodeURIComponent(msg);
  const doCopy = () => { if (navigator.clipboard) navigator.clipboard.writeText("https://" + link).catch(() => {}); onCopied(mem.id); };
  return (
    <div>
      <div style={{ background: "rgba(196,148,58,0.07)", borderRadius: 8, padding: "6px 10px", fontSize: 10, color: "#7a5c38", fontFamily: "monospace", marginBottom: 8, wordBreak: "break-all" }}>{link}</div>
      <div style={{ display: "flex", gap: 7 }}>
        <button onClick={doCopy} style={{ flex: 1, padding: "8px", borderRadius: 10, background: copied === mem.id ? "#e8f5e0" : circle.color + "14", border: "1px solid " + circle.color + "33", color: copied === mem.id ? "#5a8060" : circle.color, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{copied === mem.id ? "✅ Copied!" : "📋 Copy link"}</button>
        <button onClick={() => window.open(waUrl, "_blank")} style={{ flex: hasPhone ? 1.4 : 1, padding: "8px", borderRadius: 10, background: "#25D366", border: "none", color: "#fff", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>💬 {hasPhone ? "WhatsApp " + mem.name.split(" ")[0] : "WhatsApp"}</button>
      </div>
      {!hasPhone && <div style={{ fontSize: 9.5, color: "#b09070", marginTop: 5, fontStyle: "italic", textAlign: "center" }}>Add phone for direct WhatsApp</div>}
    </div>
  );
}

// ── MEMORY CARD ───────────────────────────────────────────────────────────────

      <div onClick={() => onEdit && onEdit(m)} style={{ height: compact ? 82 : 124, background: coverBg, position: "relative", display: "flex", alignItems: "center", justifyContent: "center", cursor: onEdit ? "pointer" : "default" }}>
        {!m.photo_url && <span style={{ fontSize: compact ? 28 : 42, opacity: 0.55 }}>{m.emoji || "📸"}</span>}
        {onEdit && <div style={{ position: "absolute", top: 8, right: 8, background: "rgba(0,0,0,0.35)", borderRadius: 20, padding: "2px 8px", fontSize: 9, color: "#fff" }}>▶ Open</div>}

  const save = async () => {
    setSaving(true);
    try {
      await sb.from("memories").update({
        place: place || "—",
        month: month || memory.month,
        year: year ? parseInt(year) : memory.year,

function ScreenJoinCode({ onJoined, onBack }) {
  const [code, setCode] = useState("");
  const [status, setStatus] = useState("idle");
  const [err, setErr] = useState("");
  const tryJoin = async () => {
    if (!code.trim()) return;
    setStatus("loading"); setErr("");
    try {
      const circleCode = code.trim().split("/").pop().toUpperCase();
      const c = await dbLoadCircle(circleCode);
      if (!c) { setStatus("idle"); setErr("Circle not found. Check your invite link."); return; }
      setStatus("found");
      setTimeout(() => onJoined(c), 1000);
    } catch(e) {
      setStatus("idle");
      setErr("Connection error — check your internet and try again.");
    }
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "#fdf6ec" }}>
      <div style={{ background: "linear-gradient(135deg,#c8943a,#8b5e28)", padding: "16px 18px", flexShrink: 0 }}>

        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ fontSize: 24 }}>{emoji}</div>

        </div>
        <div style={{ display: "flex", gap: 5, marginTop: 10 }}>{[1, 2, 3].map(s => <div key={s} style={{ height: 3, flex: 1, borderRadius: 2, background: step >= s ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.25)", transition: "background 0.3s" }} />)}</div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "18px 16px" }}>
        {step === 1 && (
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#3d2410", marginBottom: 4 }}>What's this circle called?</div>
            <div style={{ fontSize: 12, color: "#b09070", fontStyle: "italic", marginBottom: 16 }}>Family, School Gang, SG Friends — anything that feels right.</div>
            <input value={label} onChange={e => setLabel(e.target.value)} onKeyDown={e => e.key === "Enter" && label.trim() && setStep(2)} placeholder="Circle name..." style={{ width: "100%", padding: "14px 16px", borderRadius: 14, border: "2px solid rgba(196,154,60,0.25)", background: "rgba(255,255,255,0.88)", fontSize: 15, color: "#3d2410", outline: "none", marginBottom: 10 }} />
            <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 20 }}>
              {["Family", "School Gang", "College Batch", "Work Friends", "Cousins"].map(s => (
                <button key={s} onClick={() => setLabel(s)} style={{ padding: "5px 12px", borderRadius: 20, background: label === s ? color + "22" : "rgba(255,255,255,0.7)", border: "1px solid " + (label === s ? color : "rgba(196,154,60,0.2)"), color: label === s ? color : "#7a5c38", fontSize: 11, cursor: "pointer" }}>{s}</button>
              ))}
            </div>
            <button onClick={() => label.trim() && setStep(2)} style={{ width: "100%", padding: "13px", borderRadius: 16, background: label.trim() ? "linear-gradient(135deg," + color + "," + color + "cc)" : "rgba(196,154,60,0.18)", border: "none", color: label.trim() ? "#fff" : "#c0a080", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Next →</button>
          </div>
        )}
        {step === 2 && (
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#3d2410", marginBottom: 16 }}>Give it a look</div>
            <div style={{ fontSize: 11, color: "#9c7a52", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>Icon</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20 }}>
              {CIRCLE_EMOJIS.map(e => <button key={e} onClick={() => setEmoji(e)} style={{ width: 42, height: 42, borderRadius: 12, fontSize: 20, cursor: "pointer", background: emoji === e ? color + "22" : "rgba(255,255,255,0.7)", border: "2px solid " + (emoji === e ? color : "transparent") }}>{e}</button>)}
            </div>
            <div style={{ fontSize: 11, color: "#9c7a52", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>Colour</div>
            <div style={{ display: "flex", gap: 10, marginBottom: 24 }}>
              {CIRCLE_COLORS.map((c, i) => <button key={c} onClick={() => setColorIdx(i)} style={{ width: 34, height: 34, borderRadius: "50%", background: c, cursor: "pointer", border: colorIdx === i ? "3px solid #3d2410" : "3px solid transparent" }} />)}
            </div>
            <button onClick={() => setStep(3)} style={{ width: "100%", padding: "13px", borderRadius: 16, background: "linear-gradient(135deg," + color + "," + color + "cc)", border: "none", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Next →</button>
          </div>
        )}
        {step === 3 && (
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#3d2410", marginBottom: 4 }}>Who's in this circle?</div>
            <div style={{ fontSize: 12, color: "#b09070", fontStyle: "italic", marginBottom: 16 }}>Add name + phone for direct WhatsApp invites.</div>
            <AddMemberForm color={color} onAdd={m => setMembers(ms => [...ms, m])} />
            {members.map(m => (
              <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 9, padding: "9px 10px", background: "#fff", borderRadius: 12, marginBottom: 6, border: "1px solid rgba(196,154,60,0.12)" }}>
                <Av name={m.name} size={32} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#3d2410" }}>{m.name}</div>
                  {m.phone && <div style={{ fontSize: 10, color: "#5a8060" }}>📱 {m.phone}</div>}
                </div>
                <button onClick={() => setMembers(ms => ms.filter(x => x.id !== m.id))} style={{ background: "none", border: "none", color: "#d4a0a0", fontSize: 16, cursor: "pointer" }}>×</button>
              </div>
            ))}
            {members.length === 0 && (
              <div style={{ textAlign: "center", background: "rgba(196,148,58,0.05)", borderRadius: 14, padding: "18px", marginBottom: 14, border: "1.5px dashed " + color + "44" }}>
                <div style={{ fontSize: 22, marginBottom: 6, opacity: 0.4 }}>👥</div>
                <div style={{ fontSize: 12, color: "#b09070", fontStyle: "italic" }}>Add people above, or skip and invite later</div>
              </div>
            )}
            <button onClick={finish} disabled={creating} style={{ width: "100%", padding: "13px", borderRadius: 16, background: "linear-gradient(135deg," + color + "," + color + "cc)", border: "none", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", marginTop: 8, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
              {creating ? <Spin color="#fff" size={16} /> : members.length > 0 ? "Create + " + members.length + " invite" + (members.length > 1 ? "s" : "") + " →" : "Create circle →"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function HomeTab({ circle, userName, onAddVoice, onAddMemory, onEdit }) {
  const [voiceOn, setVoiceOn] = useState(false);
  const [idx, setIdx] = useState(0);
  const [hint, setHint] = useState(0);
  const [query, setQuery] = useState("");
  const hints = ["Try: \"" + (circle.members[0] ? circle.members[0].name : "Papa") + "'s memories\"", "Try: \"Best moments in Shimla\"", "Try: \"What happened in 2023\""];
  const mems = circle.memories || [];
  const mem = mems[idx] || null;
  const q = query.toLowerCase().trim();
  const searchResults = q.length < 2 ? [] : mems.filter(m => {
    const fields = [m.place, String(m.year||""), m.month, ...(m.people||[]), m.caption].join(" ").toLowerCase();
    return q.split(" ").every(word => fields.includes(word));
  });

  useEffect(() => {
    const t = setInterval(() => setHint(h => (h + 1) % hints.length), 2800);
    return () => clearInterval(t);
  }, []);

  const coverBg = mem ? (mem.photo_url ? "url(" + mem.photo_url + ") center/cover" : (mem.grad || "linear-gradient(145deg,#f5e0b8,#e8c070)")) : "linear-gradient(145deg,#3d2410,#1a0c06)";

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ flex: "0 0 52%", position: "relative", overflow: "hidden", background: coverBg }}>
        {(!mem || !mem.photo_url) && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}><span style={{ fontSize: 82, opacity: 0.35 }}>{mem ? mem.emoji : "📖"}</span></div>}
        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: "68%", background: "linear-gradient(to top,rgba(26,14,5,0.85),transparent)" }} />
        <div style={{ position: "absolute", top: 11, left: 12, background: "rgba(255,255,255,0.16)", backdropFilter: "blur(8px)", borderRadius: 17, padding: "3px 10px", fontSize: 9, color: "rgba(255,255,255,0.88)", letterSpacing: "0.1em", textTransform: "uppercase" }}>Memory of the Day</div>
        {mems.length > 1 && (
          <div style={{ position: "absolute", top: 11, right: 12, display: "flex", gap: 4 }}>
            {mems.slice(0, 5).map((_, i) => <div key={i} onClick={() => setIdx(i)} style={{ width: i === idx ? 14 : 5, height: 5, borderRadius: 3, background: i === idx ? "#fff" : "rgba(255,255,255,0.38)", cursor: "pointer", transition: "width 0.3s" }} />)}
          </div>
        )}
        {mem ? (
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "11px 13px" }}>
            <div style={{ display: "flex", gap: 5, marginBottom: 5 }}>
              <span style={{ background: "rgba(255,255,255,0.18)", borderRadius: 9, padding: "2px 7px", fontSize: 9, color: "rgba(255,255,255,0.9)" }}>📍 {mem.place || "—"}</span>
              <span style={{ background: "rgba(255,255,255,0.18)", borderRadius: 9, padding: "2px 7px", fontSize: 9, color: "rgba(255,255,255,0.85)" }}>{mem.month} {mem.year}</span>
            </div>
            <p style={{ fontStyle: "italic", fontSize: 12, color: "rgba(255,255,255,0.93)", lineHeight: 1.42, margin: "0 0 7px" }}>"{mem.caption}"</p>
            <div style={{ display: "flex", gap: 5 }}>
              {(mem.voices || []).map((v, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 4, background: "rgba(255,255,255,0.14)", borderRadius: 15, padding: "3px 8px 3px 3px" }}>
                  <Av name={v.name} size={16} col={v.col} />
                  <span style={{ fontSize: 9, color: "rgba(255,255,255,0.88)" }}>{v.name}</span>
                </div>
              ))}
            </div>
          </div>
        ) : (
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "16px", textAlign: "center" }}>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", fontStyle: "italic" }}>Your memories will appear here</div>
          </div>
        )}
      </div>
      <div style={{ flex: "0 0 48%", background: "#fdf6ec", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "12px 18px", gap: 7 }}>
        <div style={{ fontSize: 12.5, color: "#3d2410", fontWeight: 600, textAlign: "center" }}>What memory, {userName}?</div>
        <div style={{ fontSize: 10.5, color: "#b09070", fontStyle: "italic", minHeight: 13, textAlign: "center" }}>{hints[hint]}</div>
        <MicBtn on={voiceOn} color={circle.color} size={68} onClick={() => setVoiceOn(!voiceOn)} />
        <div style={{ fontSize: 9.5, color: voiceOn ? circle.color : "#c0a080", fontWeight: voiceOn ? 700 : 400, letterSpacing: "0.07em", textTransform: "uppercase" }}>{voiceOn ? "Listening..." : "Tap to speak"}</div>
        <div style={{ width: "100%", display: "flex", alignItems: "center", background: "rgba(255,255,255,0.8)", borderRadius: 22, padding: "6px 12px", border: "1px solid " + circle.color + "28", gap: 6 }}>
          <span style={{ fontSize: 11, opacity: 0.3 }}>🔍</span>
          <input
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search name, place, year..."
            style={{ border: "none", background: "transparent", outline: "none", fontSize: 11, color: "#5a3e28", flex: 1 }} />
          {query && <span onClick={() => setQuery("")} style={{ fontSize: 11, cursor: "pointer", opacity: 0.4 }}>✕</span>}
        </div>
        {query && searchResults.length > 0 && (
          <div style={{ width: "100%", background: "#fff", borderRadius: 14, border: "1px solid rgba(196,154,60,0.18)", maxHeight: 200, overflowY: "auto", boxShadow: "0 4px 16px rgba(150,100,40,0.12)" }}>
            {searchResults.map(m => (
              <div key={m.id} onClick={() => { onEdit(m); setQuery(""); }} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderBottom: "1px solid rgba(196,154,60,0.08)", cursor: "pointer" }}>
                <div style={{ width: 36, height: 36, borderRadius: 8, background: m.photo_url ? "url(" + m.photo_url + ") center/cover" : (m.grad || "linear-gradient(145deg,#f5e0b8,#e8c070)"), flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {!m.photo_url && <span style={{ fontSize: 16 }}>{m.emoji || "📸"}</span>}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#3d2410", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {m.place || "—"} · {m.month} {m.year}
                  </div>
                  <div style={{ fontSize: 10, color: "#b09070" }}>{(m.people || []).join(", ")}</div>
                </div>
                <span style={{ fontSize: 10, color: circle.color, fontWeight: 700 }}>{(m.voices || []).length} 🎙</span>
              </div>
            ))}
          </div>
        )}
        {query && searchResults.length === 0 && (
          <div style={{ fontSize: 11, color: "#b09070", fontStyle: "italic" }}>No memories found for "{query}"</div>
        )}
        <div style={{ display: "flex", gap: 8, width: "100%" }}>
          <button onClick={onAddMemory} style={{ flex: 1, padding: "8px", background: "linear-gradient(135deg," + circle.color + "," + circle.color + "bb)", border: "none", borderRadius: 19, color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>📸 Add Memory</button>
          {mem && <button onClick={() => onAddVoice(mem)} style={{ flex: 1, padding: "8px", background: "transparent", border: "1.5px solid " + circle.color, borderRadius: 19, color: circle.color, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>🎙 Add Voice</button>}
        </div>
      </div>
    </div>
  );
}

function TimelineTab({ circle, userName, onAddVoice, onAddMemory, onEdit }) {
  const [filter, setFilter] = useState("Years");
  const [sel, setSel] = useState(null);
  const [search, setSearch] = useState("");
  const mems = circle.memories || [];
  const years = [...new Set(mems.map(m => m.year))].sort((a, b) => b - a).map(String);
  const places = [...new Set(mems.map(m => m.place).filter(p => p && p !== "—"))];
  const people = (circle.members || []).map(m => m.name);
  const opts = { Years: years, Places: places, People: people };
  const chipFiltered = sel ? mems.filter(m => filter === "Years" ? String(m.year) === sel : filter === "Places" ? m.place === sel : (m.people || []).includes(sel)) : mems;
  const sq = search.toLowerCase().trim();
  const filtered = sq.length < 2 ? chipFiltered : chipFiltered.filter(m => {
    const fields = [m.place, String(m.year||""), m.month, ...(m.people||[]), m.caption].join(" ").toLowerCase();
    return sq.split(" ").every(word => fields.includes(word));
  });

  return (
    <div style={{ padding: "0 12px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 11 }}>
        <div style={{ display: "flex", gap: 6, flex: 1 }}>
          {["Years", "Places", "People"].map(t => (
            <button key={t} onClick={() => { setFilter(t); setSel(null); }} style={{ flex: 1, padding: "7px 0", borderRadius: 16, fontWeight: 700, fontSize: 11, cursor: "pointer", background: filter === t ? "linear-gradient(135deg," + circle.color + "," + circle.color + "99)" : "rgba(255,255,255,0.65)", border: "1.5px solid " + (filter === t ? "transparent" : "rgba(196,154,60,0.18)"), color: filter === t ? "#fff" : "#9c7a52" }}>{t}</button>
          ))}
        </div>
        <button onClick={onAddMemory} style={{ marginLeft: 8, padding: "7px 12px", borderRadius: 16, background: "linear-gradient(135deg," + circle.color + "," + circle.color + "cc)", border: "none", color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer", flexShrink: 0 }}>+ Add</button>
      </div>
      <div style={{ display: "flex", alignItems: "center", background: "rgba(255,255,255,0.8)", borderRadius: 22, padding: "6px 12px", border: "1px solid rgba(196,154,60,0.2)", gap: 6, marginBottom: 8 }}>
        <span style={{ fontSize: 11, opacity: 0.35 }}>🔍</span>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search memories..." style={{ border: "none", background: "transparent", outline: "none", fontSize: 11, color: "#5a3e28", flex: 1 }} />
        {search && <span onClick={() => setSearch("")} style={{ fontSize: 11, cursor: "pointer", opacity: 0.4 }}>✕</span>}
      </div>
      <div style={{ display: "flex", gap: 5, overflowX: "auto", paddingBottom: 3, marginBottom: 11 }}>
        <button onClick={() => setSel(null)} style={{ flexShrink: 0, padding: "4px 11px", borderRadius: 16, background: !sel ? circle.color : "rgba(255,255,255,0.65)", border: "none", color: !sel ? "#fff" : "#9c7a52", fontSize: 10.5, fontWeight: 600, cursor: "pointer" }}>All</button>
        {opts[filter].map(o => (
          <button key={o} onClick={() => setSel(sel === o ? null : o)} style={{ flexShrink: 0, padding: "4px 11px", borderRadius: 16, fontSize: 10.5, cursor: "pointer", border: "none", background: sel === o ? circle.color : "rgba(255,255,255,0.65)", color: sel === o ? "#fff" : "#7a5c38" }}>
            {filter === "Years" ? "📅 " + o : filter === "Places" ? "📍 " + o : "👤 " + o}
          </button>
        ))}
      </div>
      {filtered.length === 0 && (
        <div style={{ textAlign: "center", padding: "32px 0", color: "#c0a080", fontStyle: "italic", fontSize: 13 }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>📭</div>
          No memories yet.<br />
          <button onClick={onAddMemory} style={{ marginTop: 12, padding: "8px 20px", background: "linear-gradient(135deg," + circle.color + "," + circle.color + "cc)", border: "none", borderRadius: 16, color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>+ Add the first one</button>
        </div>
      )}
      {filtered.map(m => <Card key={m.id} m={m} accent={circle.color} userName={userName} onAddVoice={onAddVoice} />)}
      <div style={{ height: 20 }} />
    </div>
  );
}

      </div>
      <div style={{ fontStyle: "italic", fontSize: 10.5, color: "#b09070", marginBottom: 13 }}>Tap a face to see their memories</div>
      {(circle.members || []).length === 0 && (
        <div style={{ textAlign: "center", background: "rgba(196,148,58,0.05)", borderRadius: 16, padding: "24px", border: "1.5px dashed " + circle.color + "44", marginBottom: 12 }}>
          <div style={{ fontSize: 28, marginBottom: 8 }}>👥</div>
          <div style={{ fontSize: 12, color: "#b09070", marginBottom: 12 }}>No members yet</div>
          <button onClick={onManage} style={{ padding: "8px 20px", background: "linear-gradient(135deg," + circle.color + "," + circle.color + "bb)", border: "none", borderRadius: 16, color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>+ Add members</button>
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 9 }}>
        {(circle.members || []).map(mem => (
          <div key={mem.id} onClick={() => setSel(mem.name)} style={{ background: "#fffbf3", borderRadius: 14, padding: "14px 10px", textAlign: "center", cursor: "pointer", border: "1px solid rgba(196,154,60,0.13)" }}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 7 }}><Av name={mem.name} size={44} /></div>
            <div style={{ fontWeight: 700, fontSize: 12.5, color: "#3d2410" }}>{mem.name}</div>
            <div style={{ fontSize: 10, color: mem.joined ? "#5a8060" : "#b09070", marginTop: 2 }}>{mem.joined ? "✅ Joined" : "⏳ Pending"}</div>
          </div>
        ))}
        <div onClick={onManage} style={{ background: "rgba(196,148,58,0.05)", borderRadius: 14, padding: "14px 10px", textAlign: "center", cursor: "pointer", border: "1.5px dashed " + circle.color + "44", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 5, minHeight: 96 }}>
          <div style={{ fontSize: 22, opacity: 0.4 }}>➕</div>
          <div style={{ fontSize: 11, color: "#b09070" }}>Add someone</div>
        </div>
      </div>
    </div>
  );
}

function ManageTab({ circle, onClose, onUpdate }) {
  const [copied, setCopied] = useState(null);
  const addMember = async m => {
    try { await dbAddMember(circle.id, m); onUpdate({ ...circle, members: [...circle.members, m] }); }
    catch(e) { alert("Could not add member."); }
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "#fdf6ec" }}>
      <div style={{ background: "linear-gradient(135deg," + circle.color + "," + circle.color + "bb)", padding: "13px 15px", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={onClose} style={{ background: "rgba(255,255,255,0.22)", border: "none", borderRadius: 9, padding: "5px 10px", color: "#fff", fontSize: 12, cursor: "pointer", fontWeight: 700 }}>← Back</button>
          <div>
            <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(255,255,255,0.65)" }}>Managing</div>
            <div style={{ fontSize: 15, fontWeight: 800, color: "#fff" }}>{circle.emoji} {circle.label}</div>
          </div>
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "14px 13px 8px" }}>
        <AddMemberForm color={circle.color} onAdd={addMember} />
        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#b09070", marginBottom: 10 }}>{(circle.members || []).length} Members</div>
        {(circle.members || []).map(mem => (
          <div key={mem.id} style={{ background: "#fff", borderRadius: 13, padding: "11px 12px", marginBottom: 10, border: "1px solid rgba(196,154,60,0.12)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 10 }}>
              <Av name={mem.name} size={36} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#3d2410" }}>{mem.name}</div>
                {mem.phone ? <div style={{ fontSize: 10, color: "#5a8060", marginTop: 1 }}>📱 {mem.phone}</div> : <div style={{ fontSize: 10, color: "#b09070", marginTop: 1 }}>No phone saved</div>}
                <div style={{ fontSize: 10, color: mem.joined ? "#5a8060" : "#b09070", marginTop: 1 }}>{mem.joined ? "✅ Joined" : "⏳ Not yet joined"}</div>
              </div>
            </div>
            <InviteActions mem={mem} circle={circle} copied={copied} onCopied={setCopied} />
          </div>
        ))}
      </div>
    </div>
  );
}

function CirclesSheet({ circles, active, onSelect, onClose }) {
  return (
    <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(18,8,2,0.82)", zIndex: 100, display: "flex", flexDirection: "column", justifyContent: "flex-end", borderRadius: 42 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#fdf6ec", borderRadius: "24px 24px 0 0", padding: "16px 14px 26px" }}>
        <div style={{ width: 30, height: 3, borderRadius: 2, background: "#d4b896", margin: "0 auto 14px" }} />
        <div style={{ fontSize: 14, fontWeight: 700, color: "#3d2410", marginBottom: 14 }}>Your Circles</div>
        {circles.map(c => (
          <div key={c.id} onClick={() => onSelect(c)} style={{ display: "flex", alignItems: "center", gap: 11, padding: "10px 12px", borderRadius: 13, marginBottom: 7, cursor: "pointer", background: active === c.id ? c.color + "14" : "rgba(255,255,255,0.6)", border: "1.5px solid " + (active === c.id ? c.color : "rgba(196,154,60,0.14)") }}>
            <div style={{ width: 38, height: 38, borderRadius: "50%", background: "linear-gradient(135deg," + c.color + "," + c.color + "99)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, flexShrink: 0 }}>{c.emoji}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: "#3d2410" }}>{c.label}</div>
              <div style={{ fontSize: 10, color: "#b09070", marginTop: 1 }}>{(c.members || []).length} members · {(c.memories || []).length} memories</div>
            </div>
            {active === c.id && <div style={{ width: 6, height: 6, borderRadius: "50%", background: c.color }} />}
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [phase, setPhase] = useState("loading");
  const [userName, setUserName] = useState("");
  const [tab, setTab] = useState("home");
  const [showCircles, setShowCircles] = useState(false);
  const [managing, setManaging] = useState(false);
  const [circles, setCircles] = useState([]);
  const [activeCircleId, setActiveCircleId] = useState(null);
  const [newCircle, setNewCircle] = useState(null);
  const [recorderTarget, setRecorderTarget] = useState(null);
  const [addingMemory, setAddingMemory] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  const [detailTarget, setDetailTarget] = useState(null);

  const circle = circles.find(c => c.id === activeCircleId) || circles[0] || null;
  const upd = updated => setCircles(cs => cs.map(c => c.id === updated.id ? updated : c));

  const enterApp = (name, circ) => {
    localStorage.setItem("ourstory_v14", JSON.stringify({ name, code: circ.code }));
    setUserName(name);
    setCircles([circ]);
    setActiveCircleId(circ.id);
    setPhase("app");
  };

  useEffect(() => {
    const saved = localStorage.getItem("ourstory_v14");
    if (saved) {
      try {
        const { name, code } = JSON.parse(saved);
        setUserName(name);
        dbLoadCircle(code)
          .then(c => {
            if (c) { setCircles([c]); setActiveCircleId(c.id); setPhase("app"); }
            else {
              // Circle code not found in DB — genuinely gone
              localStorage.removeItem("ourstory_v14");
              setPhase("name");
            }
          })
          .catch(() => {
            // Network error — DO NOT wipe session, show retry instead
            setPhase("retry");
          });
      } catch(e) { setPhase("name"); }
    } else {
      setPhase("name");
    }
  }, []);

  const retryLoad = () => {
    setPhase("loading");
    const saved = localStorage.getItem("ourstory_v14");
    if (!saved) { setPhase("name"); return; }
    try {
      const { name, code } = JSON.parse(saved);
      setUserName(name);
      dbLoadCircle(code)
        .then(c => {
          if (c) { setCircles([c]); setActiveCircleId(c.id); setPhase("app"); }
          else { localStorage.removeItem("ourstory_v14"); setPhase("name"); }
        })
        .catch(() => setPhase("retry"));
    } catch(e) { setPhase("name"); }
  };

  const saveVoice = voiceData => {
    if (!recorderTarget || !circle) return;
    const updMems = (circle.memories || []).map(m => {
      if (m.id !== recorderTarget.id) return m;
      const existing = (m.voices || []).findIndex(v => v.name === userName);
      const voices = existing >= 0
        ? m.voices.map((v, i) => i === existing ? voiceData : v)
        : [...(m.voices || []), voiceData];
      return { ...m, voices };
    });
    upd({ ...circle, memories: updMems });
    setRecorderTarget(null);
  };

  const switchCircle = c => {
    setActiveCircleId(c.id);
    localStorage.setItem("ourstory_v14", JSON.stringify({ name: userName, code: c.code }));
    setTab("home");
    setManaging(false);
    setShowCircles(false);
  };

  const TABS = [
    { id: "home", icon: "🏠", label: "Home" },
    { id: "timeline", icon: "📖", label: "Timeline" },
    { id: "search", icon: "🔍", label: "Search" },
    { id: "people", icon: "👥", label: "People" },
  ];

  if (phase === "loading") return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#1a0c06", flexDirection: "column", gap: 16 }}>
      <div style={{ fontSize: 48 }}>📖</div>
      <Spin color="#c8943a" size={28} />
      <div style={{ fontSize: 12, color: "rgba(255,255,255,0.35)" }}>Loading Our Story...</div>
    </div>
  );

  if (phase === "retry") return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#1a0c06", flexDirection: "column", gap: 16, padding: 24, textAlign: "center" }}>
      <div style={{ fontSize: 48 }}>📡</div>
      <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>Connection issue</div>
      <div style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", lineHeight: 1.7 }}>Could not reach the server.<br/>Check your connection and try again.</div>
      <button onClick={retryLoad} style={{ padding: "14px 32px", borderRadius: 20, background: "linear-gradient(135deg,#c8943a,#8b5e28)", border: "none", color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>Try again</button>
      <button onClick={() => { localStorage.removeItem("ourstory_v14"); setPhase("name"); }} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.3)", fontSize: 12, cursor: "pointer", textDecoration: "underline" }}>Start fresh instead</button>
    </div>
  );

  if (phase !== "app") return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#1a0c06" }}>
      <div style={{ width: 350, height: 755, borderRadius: 42, background: "#fdf6ec", boxShadow: "0 30px 75px rgba(0,0,0,0.55)", overflow: "hidden", display: "flex", flexDirection: "column" }}>
        {phase === "name" && <ScreenName onNext={n => { setUserName(n); setPhase("choosePath"); }} />}
        {phase === "choosePath" && <ScreenChoosePath userName={userName} onJoin={() => setPhase("joinCode")} onCreate={() => setPhase("createCircle")} onBack={() => setPhase("name")} />}
        {phase === "joinCode" && <ScreenJoinCode onJoined={c => enterApp(userName, c)} onBack={() => setPhase("choosePath")} />}
        {phase === "createCircle" && <ScreenCreateCircle onBack={() => setPhase("choosePath")} onCreate={c => { setNewCircle(c); setPhase("invitesReady"); }} />}
        {phase === "invitesReady" && newCircle && <ScreenInvitesReady circle={newCircle} onDone={() => enterApp(userName, newCircle)} />}
      </div>
    </div>
  );

  if (!circle) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#1a0c06" }}>
      <Spin color="#c8943a" size={28} />
    </div>
  );

  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#1a0c06" }}>
      <div style={{ width: 350, height: 755, borderRadius: 42, background: "#fdf6ec", boxShadow: "0 30px 75px rgba(0,0,0,0.55)", overflow: "hidden", display: "flex", flexDirection: "column", position: "relative" }}>

        {recorderTarget && <RecorderSheet memory={recorderTarget} speakerName={userName} color={circle.color} onSaved={saveVoice} onClose={() => setRecorderTarget(null)} />}
        {detailTarget && <MemoryDetail memory={detailTarget} circle={circle} userName={userName} onAddVoice={m => { setDetailTarget(null); setRecorderTarget(m); }} onEdit={m => { setDetailTarget(null); setEditTarget(m); }} onClose={() => setDetailTarget(null)} />}
        {editTarget && <EditMemorySheet memory={editTarget} circle={circle} userName={userName} onSaved={updCircle => { if (updCircle) upd(updCircle); }} onClose={() => setEditTarget(null)} />}
        {addingMemory && <AddMemorySheet circle={circle} userName={userName} onSaved={updCircle => {
              setAddingMemory(false);
              setTab("timeline");
              // Refresh circle data in background
              dbLoadCircle(circle.code).then(c => { if (c) upd(c); }).catch(() => {});
            }} onClose={() => setAddingMemory(false)} />}
        {showCircles && <CirclesSheet circles={circles} active={activeCircleId} onSelect={switchCircle} onClose={() => setShowCircles(false)} />}

        <div style={{ padding: "10px 14px 7px", background: "#fdf6ec", flexShrink: 0, borderBottom: "1px solid rgba(196,154,60,0.09)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 8, letterSpacing: "0.13em", textTransform: "uppercase", color: "#b09070" }}>Our Story · {userName}</div>
              <button onClick={() => setShowCircles(true)} style={{ display: "flex", alignItems: "center", gap: 5, background: circle.color + "16", border: "1px solid " + circle.color + "40", borderRadius: 17, padding: "3px 10px 3px 7px", cursor: "pointer", marginTop: 2 }}>
                <span style={{ fontSize: 13 }}>{circle.emoji}</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: "#3d2410" }}>{circle.label}</span>
                <span style={{ fontSize: 8, color: "#b09070", marginLeft: 1 }}>▾</span>
              </button>
            </div>
            <button onClick={() => setAddingMemory(true)} style={{ width: 33, height: 33, borderRadius: "50%", background: "linear-gradient(135deg," + circle.color + "," + circle.color + "aa)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, border: "none", cursor: "pointer", boxShadow: "0 4px 12px " + circle.color + "44" }}>＋</button>
          </div>
        </div>

        <div style={{ flex: 1, overflowY: (tab === "home" && !managing) ? "hidden" : "auto", paddingTop: (tab === "home" && !managing) ? 0 : 12 }}>
          {managing
            ? <ManageTab circle={circle} onClose={() => setManaging(false)} onUpdate={upd} />
            : tab === "home" ? <HomeTab circle={circle} userName={userName} onAddVoice={m => setRecorderTarget(m)} onAddMemory={() => setAddingMemory(true)} onEdit={m => setDetailTarget(m)} />
              : tab === "timeline" ? <TimelineTab circle={circle} userName={userName} onAddVoice={m => setRecorderTarget(m)} onAddMemory={() => setAddingMemory(true)} onEdit={m => setDetailTarget(m)} />
              : tab === "search" ? <SearchTab circle={circle} userName={userName} onAddVoice={m => setRecorderTarget(m)} onEdit={m => setDetailTarget(m)} />
                : <PeopleTab circle={circle} onManage={() => setManaging(true)} userName={userName} onAddVoice={m => setRecorderTarget(m)} onEdit={m => setDetailTarget(m)} />
          }
        </div>

        {!managing && (
          <div style={{ background: "#fdf6ec", borderTop: "1px solid rgba(196,154,60,0.12)", display: "flex", alignItems: "flex-start", paddingTop: 7, paddingBottom: "calc(8px + env(safe-area-inset-bottom,0px))", flexShrink: 0 }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, background: "none", border: "none", cursor: "pointer" }}>
                <span style={{ fontSize: 17, opacity: tab === t.id ? 1 : 0.48 }}>{t.icon}</span>
                <span style={{ fontSize: 9, fontWeight: tab === t.id ? 700 : 500, color: tab === t.id ? circle.color : "#b09070" }}>{t.label}</span>
                {tab === t.id && <div style={{ width: 12, height: 2, borderRadius: 2, background: circle.color }} />}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
